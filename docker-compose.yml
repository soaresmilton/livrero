services:
  db:
    image: postgres:16-alpine
    container_name: livrero-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: livrero
      POSTGRES_PASSWORD: livrero
      POSTGRES_DB: livrero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livrero -d livrero"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - livrero-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: livrero-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://livrero:livrero@db:5432/livrero
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    networks:
      - livrero-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: livrero-web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - livrero-network

volumes:
  postgres_data:
    driver: local

networks:
  livrero-network:
    driver: bridge
